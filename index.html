<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESLAV SWAP | Premium Exchange</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg: #18222d;
            --card: #212d3b;
            --accent: #0088cc;
            --text: #ffffff;
            --hint: #b1c3d5;
            --success: #4cd964;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .exchange-card {
            background: var(--card);
            padding: 25px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 380px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .ton-logo { width: 60px; height: 60px; margin: 0 auto 10px; background: var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .ton-logo svg { width: 35px; fill: white; }

        h2 { text-align: center; margin: 5px 0; font-size: 22px; letter-spacing: 1px; }
        .rate-badge { text-align: center; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 12px; font-size: 11px; margin-bottom: 15px; }

        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 10px; color: var(--hint); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #2f3e4e; background: #1c2733; color: white; outline: none; box-sizing: border-box; font-size: 14px; }
        
        .calc-res { background: rgba(0,136,204,0.1); padding: 15px; border-radius: 18px; text-align: center; border: 1px solid var(--accent); margin: 15px 0; }
        .calc-res span { color: var(--accent); font-size: 28px; font-weight: 800; display: block; }

        .main-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; transition: 0.3s; }
        .pay-btn { background: var(--success); display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        #ton-connect-button { display: flex; justify-content: center; margin-bottom: 15px; }

        .footer { font-size: 11px; color: var(--hint); text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="exchange-card">
    <div class="ton-logo">
        <svg viewBox="0 0 512 512"><path d="M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256s256-114.6 256-256S397.4 0 256 0zM380.1 169.5L271.7 394c-4.4 9.1-13.4 14.8-23.5 14.8s-19.1-5.7-23.5-14.8L116.3 169.5c-4.1-8.5-3.3-18.6 2.1-26.3c5.4-7.7 14.4-12.3 23.9-12.3h220.1c9.5 0 18.5 4.6 23.9 12.3c5.7 7.7 6.5 17.8 2.4 26.3z"></path></svg>
    </div>
    <h2>LESLAV SWAP</h2>
    <div class="rate-badge">1 TON = 100k UA | 5000 GRAM = 1 UA</div>

    <div class="input-group">
        <label>Валюта чека</label>
        <select id="type" onchange="calculate()">
            <option value="TON">TON Blockchain</option>
            <option value="GRAM">PR GRAM</option>
            <option value="USD">USD ($)</option>
        </select>
    </div>

    <div class="input-group">
        <label id="l_amt">Кількість</label>
        <input type="number" id="amt" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="calc-res">
        Ви отримаєте:<br><span id="res">0 UA</span>
    </div>

    <div id="ton-connect-button"></div>

    <button class="main-btn pay-btn" id="btn-pay" onclick="payDirectly()">
        💎 ОПЛАТИТИ ЧЕРЕЗ ГАМАНЕЦЬ
    </button>

    <div style="text-align: center; margin: 15px 0; font-size: 10px; color: var(--hint); border-top: 1px solid #2f3e4e; padding-top: 15px;">АБО ОФОРМИТИ ЧЕРЕЗ ЧЕК</div>

    <div class="input-group">
        <label>Сервіс чеку</label>
        <select id="service">
            <option value="Crypto Bot">Crypto Bot</option>
            <option value="xRocket">xRocket</option>
            <option value="PR GRAM">PR GRAM</option>
            <option value="iCryptoCheck">iCryptoCheck</option>
        </select>
    </div>

    <div class="input-group">
        <label>Ваш гаманець TON (UQ...)</label>
        <input type="text" id="wal" placeholder="Адреса для отримання UA">
    </div>

    <div class="input-group">
        <label>Посилання на чек</label>
        <input type="text" id="chk" placeholder="t.me/...">
    </div>

    <button class="main-btn" onclick="swap()">ВІДПРАВИТИ ЗАЯВКУ</button>
    
    <div class="footer">
        © 2026 <b>Leslav</b> & <b>Gemini AI</b>
    </div>
</div>

<script>
    const MY_WALLET = "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw";

    // Ініціалізація зв'язку з гаманцем
    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: 'https://leslav2025.github.io/Onminnyk/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    function calculate() {
        const t = document.getElementById('type').value;
        const a = parseFloat(document.getElementById('amt').value) || 0;
        document.getElementById('l_amt').innerText = "Кількість " + t;
        let target = t==='TON' ? a*100000 : (t==='GRAM' ? a/5000 : a*20000);
        document.getElementById('res').innerText = Math.floor(target).toLocaleString('uk-UA') + " UA";
    }

    async function payDirectly() {
        if (!tonConnectUI.connected) {
            alert("Будь ласка, натисніть синю кнопку 'Connect Wallet' вище, щоб підключити свій гаманець!");
            tonConnectUI.openModal();
            return;
        }

        const amount = document.getElementById('amt').value;
        if(!amount || amount <= 0) return alert("Введіть кількість монет!");

        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 60,
            messages: [{
                address: MY_WALLET,
                amount: (amount * 1000000000).toString() // Конвертація в нанотони
            }]
        };

        try {
            await tonConnectUI.sendTransaction(transaction);
            alert("Транзакцію успішно надіслано в гаманець!");
        } catch (e) {
            alert("Помилка оплати або скасовано.");
        }
    }

    function swap() {
        const a = document.getElementById('amt').value;
        const w = document.getElementById('wal').value;
        const c = document.getElementById('chk').value;
        const t = document.getElementById('type').value;
        const s = document.getElementById('service').value;
        if(!a || !w || !c) return alert("Заповніть усі поля заявки!");
        
        const m = `🚀 НОВА ЗАЯВКА\n\n💰 Сума: ${a} ${t}\n📥 Отримаю: ${document.getElementById('res').innerText}\n🔹 Сервіс: ${s}\n💎 Гаманець: ${w}\n🔗 Чек: ${c}`;
        window.open(`https://t.me/Leslav?text=${encodeURIComponent(m)}`);
    }
</script>
</body>
</html>
