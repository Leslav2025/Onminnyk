<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESLAV SWAP | Premium Exchange</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg: #18222d;
            --card: #212d3b;
            --accent: #0088cc;
            --text: #ffffff;
            --hint: #b1c3d5;
            --success: #4cd964;
            --overlay: rgba(0, 0, 0, 0.85);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .exchange-card {
            background: var(--card);
            padding: 25px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 380px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .ton-logo { width: 60px; height: 60px; margin: 0 auto 10px; background: var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .ton-logo svg { width: 35px; fill: white; }

        h2 { text-align: center; margin: 5px 0; font-size: 22px; letter-spacing: 1px; }
        .rate-badge { text-align: center; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 12px; font-size: 11px; margin-bottom: 15px; }

        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 10px; color: var(--hint); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #2f3e4e; background: #1c2733; color: white; outline: none; box-sizing: border-box; font-size: 14px; }
        
        .calc-res { background: rgba(0,136,204,0.1); padding: 15px; border-radius: 18px; text-align: center; border: 1px solid var(--accent); margin: 15px 0; }
        .calc-res span { color: var(--accent); font-size: 28px; font-weight: 800; display: block; }

        /* Wallet Info Box */
        .wallet-info { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; font-size: 9px; color: var(--hint); margin-bottom: 15px; word-break: break-all; border: 1px dashed #2f3e4e; }

        .main-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .pay-btn { background: var(--success); font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        #ton-connect-button { display: flex; justify-content: center; margin-bottom: 15px; }

        .row-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .secondary-btn { flex: 1; padding: 10px; background: transparent; color: var(--hint); border: 1px solid #2f3e4e; border-radius: 12px; font-size: 12px; cursor: pointer; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: var(--overlay); justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 24px; width: 85%; max-width: 320px; border: 1px solid var(--accent); }

        .footer { font-size: 11px; color: var(--hint); text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
    </style>
</head>
<body>

<div class="exchange-card">
    <div class="ton-logo">
        <svg viewBox="0 0 512 512"><path d="M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256s256-114.6 256-256S397.4 0 256 0zM380.1 169.5L271.7 394c-4.4 9.1-13.4 14.8-23.5 14.8s-19.1-5.7-23.5-14.8L116.3 169.5c-4.1-8.5-3.3-18.6 2.1-26.3c5.4-7.7 14.4-12.3 23.9-12.3h220.1c9.5 0 18.5 4.6 23.9 12.3c5.7 7.7 6.5 17.8 2.4 26.3z"></path></svg>
    </div>
    <h2>LESLAV SWAP</h2>
    <div class="rate-badge">1 TON = 100k UA | 5000 GRAM = 1 UA</div>

    <div class="input-group">
        <label>Кількість для обміну</label>
        <input type="number" id="amt" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="calc-res">
        Ви отримаєте:<br><span id="res">0 UA</span>
    </div>

    <div id="ton-connect-button"></div>

    <div class="wallet-info">
        <b>Отримувач:</b><br>
        UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw
    </div>

    <button class="main-btn pay-btn" onclick="handlePayment()">
        💎 ОПЛАТИТИ ЧЕРЕЗ ГАМАНЕЦЬ
    </button>

    <div style="text-align: center; margin: 10px 0; font-size: 11px; color: var(--hint);">АБО ЧЕРЕЗ ЧЕК</div>

    <div class="input-group">
        <label>Посилання на чек</label>
        <input type="text" id="chk" placeholder="t.me/CryptoBot?start=...">
    </div>

    <button class="main-btn" onclick="swap()">ОФОРМИТИ ЗАЯВКУ</button>
    
    <div class="row-btns">
        <button class="secondary-btn" onclick="openModal()">⭐️ Відгук</button>
        <button class="secondary-btn" onclick="share()">🔗 Поділитися</button>
    </div>

    <div class="footer">
        © 2026 <b>Leslav</b> & <b>Gemini AI</b>
    </div>
</div>

<div id="reviewModal" class="modal">
    <div class="modal-content">
        <h3 style="text-align:center">Залишити відгук</h3>
        <input type="text" id="rev_name" placeholder="Ваше ім'я" style="margin-bottom:10px">
        <textarea id="rev_msg" rows="4" placeholder="Ваш відгук"></textarea>
        <button class="main-btn" onclick="sendReview()" style="margin-top:10px">ВІДПРАВИТИ</button>
        <button class="secondary-btn" onclick="closeModal()" style="width:100%">Закрити</button>
    </div>
</div>

<script>
    const MY_WALLET = "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw";

    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: 'https://leslav2025.github.io/Onminnyk/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    async function handlePayment() {
        if (!tonConnectUI.connected) {
            alert("Спочатку підключіть гаманець кнопкою вище!");
            tonConnectUI.openModal();
            return;
        }

        const amount = document.getElementById('amt').value;
        if(!amount || amount <= 0) return alert("Вкажіть кількість!");

        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 60,
            messages: [{
                address: MY_WALLET,
                amount: (amount * 1000000000).toString()
            }]
        };

        try {
            await tonConnectUI.sendTransaction(transaction);
            alert("Транзакцію надіслано!");
        } catch (e) { alert("Оплата скасована."); }
    }

    function calculate() {
        const a = parseFloat(document.getElementById('amt').value) || 0;
        document.getElementById('res').innerText = (Math.floor(a * 100000)).toLocaleString('uk-UA') + " UA";
    }

    function swap() {
        const a = document.getElementById('amt').value;
        const c = document.getElementById('chk').value;
        if(!a || !c) return alert("Заповніть суму та посилання на чек!");
        window.open(`https://t.me/Leslav?text=${encodeURIComponent("🚀 ЗАЯВКА\nСума: "+a+" TON\nЧек: "+c)}`);
    }

    function share() {
        navigator.clipboard.writeText(window.location.href);
        alert("Посилання скопійовано!");
    }

    function openModal() { document.getElementById('reviewModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('reviewModal').style.display = 'none'; }
    function sendReview() {
        const n = document.getElementById('rev_name').value;
        const m = document.getElementById('rev_msg').value;
        if(!n || !m) return alert("Заповніть поля!");
        window.open(`https://t.me/Leslav?text=${encodeURIComponent("⭐️ ВІДГУК\nВід: "+n+"\n"+m)}`);
        closeModal();
    }
</script>
</body>
</html>
