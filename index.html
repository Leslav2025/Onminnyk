<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESLAV SWAP | Premium Exchange</title>
    <style>
        :root {
            --bg: #18222d;
            --card: #212d3b;
            --accent: #0088cc;
            --text: #ffffff;
            --hint: #b1c3d5;
            --success: #4cd964;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .exchange-card {
            background: var(--card);
            padding: 25px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 380px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }

        /* Status & Logo */
        .status { position: absolute; top: 20px; right: 20px; font-size: 10px; color: var(--success); font-weight: bold; display: flex; align-items: center; }
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; margin-right: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76, 217, 100, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(76, 217, 100, 0); } 100% { box-shadow: 0 0 0 0 rgba(76, 217, 100, 0); } }

        .ton-logo { width: 60px; height: 60px; margin: 0 auto 10px; background: var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .ton-logo svg { width: 35px; fill: white; }

        h2 { text-align: center; margin: 5px 0; font-size: 22px; letter-spacing: 1px; }
        .rate-badge { text-align: center; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 12px; font-size: 11px; margin-bottom: 15px; }

        /* Widget */
        .widget { margin-bottom: 15px; border-radius: 12px; overflow: hidden; height: 40px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 10px; color: var(--hint); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #2f3e4e; background: #1c2733; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        .paste-btn { position: absolute; right: 10px; background: none; border: none; color: var(--accent); cursor: pointer; font-size: 14px; padding: 5px; }

        .calc-res { background: rgba(0,136,204,0.1); padding: 15px; border-radius: 18px; text-align: center; border: 1px solid var(--accent); margin: 15px 0; }
        .calc-res span { color: var(--accent); font-size: 28px; font-weight: 800; display: block; }

        .main-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .share-btn { width: 100%; padding: 10px; background: transparent; color: var(--hint); border: 1px solid #2f3e4e; border-radius: 12px; font-size: 12px; cursor: pointer; }

        /* FAQ */
        .faq-section { margin-top: 20px; text-align: left; }
        details { background: #1c2733; border-radius: 10px; margin-bottom: 5px; padding: 10px; font-size: 12px; border: 1px solid rgba(255,255,255,0.03); }
        summary { cursor: pointer; font-weight: bold; outline: none; }
        details p { margin-top: 8px; color: var(--hint); line-height: 1.4; }

        /* Counter */
        .visitor-counter {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            font-size: 11px;
            color: var(--hint);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .counter-num { color: var(--success); font-weight: bold; font-family: monospace; font-size: 14px; }

        .footer { margin-top: 20px; font-size: 10px; color: var(--hint); text-align: center; opacity: 0.8; }
    </style>
</head>
<body>

<div class="exchange-card">
    <div class="status"><div class="dot"></div> Online</div>
    <div class="ton-logo">
        <svg viewBox="0 0 512 512"><path d="M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256s256-114.6 256-256S397.4 0 256 0zM380.1 169.5L271.7 394c-4.4 9.1-13.4 14.8-23.5 14.8s-19.1-5.7-23.5-14.8L116.3 169.5c-4.1-8.5-3.3-18.6 2.1-26.3c5.4-7.7 14.4-12.3 23.9-12.3h220.1c9.5 0 18.5 4.6 23.9 12.3c5.7 7.7 6.5 17.8 2.4 26.3z"></path></svg>
    </div>
    <h2>LESLAV SWAP</h2>
    <div class="rate-badge">1 TON = 100k UA | 5000 GRAM = 1 UA</div>

    <div class="widget">
        <iframe src="https://widget.coinlib.io/widget?type=horizontal_v2&theme=dark&pref_coin_id=1505&crypto_ids=1614051" width="100%" height="40px" scrolling="no" frameborder="0" style="border:0;margin:0;padding:0;"></iframe>
    </div>

    <div class="input-group">
        <label>Валюта чека</label>
        <select id="type" onchange="calculate()">
            <option value="TON">TON Blockchain</option>
            <option value="GRAM">PR GRAM</option>
            <option value="USD">USD ($)</option>
        </select>
    </div>

    <div class="input-group">
        <label id="l_amt">Кількість</label>
        <input type="number" id="amt" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="calc-res">
        Отримаєте:<br><span id="res">0 UA</span>
    </div>

    <div class="input-group">
        <label>Ваш гаманець TON</label>
        <div class="input-wrapper">
            <input type="text" id="wal" placeholder="UQ... або EQ...">
            <button class="paste-btn" onclick="paste('wal')">📋</button>
        </div>
    </div>

    <div class="input-group">
        <label>Посилання на чек</label>
        <div class="input-wrapper">
            <input type="text" id="chk" placeholder="Вставте чек...">
            <button class="paste-btn" onclick="paste('chk')">📋</button>
        </div>
    </div>

    <button class="main-btn" onclick="swap()">Оформити обмін</button>
    <button class="share-btn" onclick="share()">🔗 Копіювати посилання</button>

    <div class="faq-section">
        <details>
            <summary>Скільки чекати?</summary>
            <p>Від 5 хвилин до 24 годин. Обробка йде в порядку черги.</p>
        </details>
        <details>
            <summary>Куди прийдуть UA?</summary>
            <p>На вказаний вами гаманець у мережі TON Blockchain.</p>
        </details>
    </div>

    <div class="visitor-counter">
        👥 Переглядів сервісу: <span class="counter-num" id="visit-count">...</span>
    </div>

    <div class="footer">
        Leslav Swap © 2024 | Secure Exchange
    </div>
</div>

<script>
    // Логіка лічильника (імітація для GitHub Pages, бо там немає бази даних)
    function updateCounter() {
        let count = localStorage.getItem('visit_count');
        if (!count) count = Math.floor(Math.random() * 500) + 100; // Початкове число
        count = parseInt(count) + 1;
        localStorage.setItem('visit_count', count);
        document.getElementById('visit-count').innerText = count.toLocaleString();
    }
    updateCounter();

    let curVal = 0;
    function calculate() {
        const t = document.getElementById('type').value;
        const a = parseFloat(document.getElementById('amt').value) || 0;
        const r = document.getElementById('res');
        document.getElementById('l_amt').innerText = "Кількість " + t;
        let target = t==='TON' ? a*100000 : (t==='GRAM' ? a/5000 : a*20000);
        animate(curVal, Math.floor(target), r);
        curVal = Math.floor(target);
    }

    function animate(s, e, obj) {
        let start = null;
        const step = (ts) => {
            if (!start) start = ts;
            const p = Math.min((ts - start) / 400, 1);
            const v = Math.floor(p * (e - s) + s);
            obj.innerText = v.toLocaleString('uk-UA') + " UA";
            if (p < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    }

    async function paste(id) {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById(id).value = text;
        } catch (err) { alert("Надайте доступ до буфера обміну"); }
    }

    function share() {
        navigator.clipboard.writeText(window.location.href);
        alert("Посилання скопійовано! 🚀");
    }

    function swap() {
        const a = document.getElementById('amt').value;
        const w = document.getElementById('wal').value;
        const c = document.getElementById('chk').value;
        if(!a || !w || !c) return alert("Заповніть всі поля!");
        const m = `🚀 ЗАЯВКА: ${a} ${document.getElementById('type').value}\n📥 Отримую: ${document.getElementById('res').innerText}\n💎 Гаманець: ${w}\n🔗 Чек: ${c}`;
        window.open(`https://t.me/Leslav?text=${encodeURIComponent(m)}`);
    }
</script>
</body>
</html>
