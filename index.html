<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESLAV SWAP | Фіксований Курс</title>
    <style>
        :root {
            --tg-theme-bg-color: #18222d;
            --tg-theme-button-color: #2ea6ff;
            --tg-theme-text-color: #ffffff;
            --tg-theme-hint-color: #b1c3d5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .exchange-card {
            background: #212d3b;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        h2 { margin: 0 0 5px 0; color: var(--tg-theme-button-color); font-size: 24px; text-transform: uppercase; letter-spacing: 1.5px; }
        .rate-info { font-size: 11px; color: #4cd964; margin-bottom: 15px; line-height: 1.4; }

        .input-group { text-align: left; margin-bottom: 12px; }
        label { display: block; font-size: 10px; margin-bottom: 5px; color: var(--tg-theme-hint-color); text-transform: uppercase; font-weight: bold; }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #2f3e4e;
            background: #1c2733;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }

        .calc-res {
            background: rgba(46, 166, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            border: 1px solid var(--tg-theme-button-color);
        }

        .calc-res span { color: var(--tg-theme-button-color); font-size: 22px; font-weight: bold; }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--tg-theme-button-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .footer { margin-top: 15px; font-size: 10px; color: var(--tg-theme-hint-color); line-height: 1.4; }
    </style>
</head>
<body>

<div class="exchange-card">
    <h2>LESLAV SWAP</h2>
    <div class="rate-info">
        Курс: 1 UA = 0.000010 TON<br>
        Курс: 1 UA = 5000 PR GRAM
    </div>

    <div class="input-group">
        <label>Валюта, яку віддаєте</label>
        <select id="currency_type" onchange="calculate()">
            <option value="TON">TON</option>
            <option value="GRAM">PR GRAM</option>
            <option value="USD">Долари ($)</option>
        </select>
    </div>

    <div class="input-group">
        <label id="amount_label">Кількість TON</label>
        <input type="number" id="amount_input" placeholder="0" oninput="calculate()">
    </div>

    <div class="calc-res">
        Ви отримаєте:<br>
        <span id="result_display">0</span> UA
    </div>

    <div class="input-group">
        <label>Сервіс чеку</label>
        <select id="service_select">
            <option value="Crypto Bot">Чек Crypto Bot</option>
            <option value="xRocket">Чек xRocket</option>
            <option value="PR GRAM">Чек PR GRAM</option>
            <option value="iCryptoCheck">Чек iCryptoCheck</option>
        </select>
    </div>

    <div class="input-group">
        <label>Посилання на чек</label>
        <input type="text" id="check_link" placeholder="Вставте посилання">
    </div>

    <div class="input-group">
        <label>Ваш гаманець TON (UQ...)</label>
        <input type="text" id="wallet_address" placeholder="Вставте адресу">
    </div>

    <button onclick="startExchange()">Обміняти</button>

    <div class="footer">
        Ручний обмін за курсом LESLAV SWAP.
    </div>
</div>

<script>
    function calculate() {
        const type = document.getElementById('currency_type').value;
        const amount = document.getElementById('amount_input').value;
        const label = document.getElementById('amount_label');
        const resDisplay = document.getElementById('result_display');
        
        label.innerText = "Кількість " + (type === 'USD' ? 'Доларів ($)' : type);

        let result = 0;
        if (amount > 0) {
            if (type === 'TON') {
                // Твій курс: 1 UA = 0.000010 TON => 1 TON = 100,000 UA
                result = amount / 0.000010;
            } else if (type === 'GRAM') {
                // Твій курс: 5000 GRAM = 1 UA
                result = amount / 5000;
            } else if (type === 'USD') {
                // Приблизний курс долара до UA через TON ($5 = 100,000 UA)
                result = amount * 20000;
            }
            resDisplay.innerText = Math.floor(result).toLocaleString();
        } else {
            resDisplay.innerText = "0";
        }
    }

    function startExchange() {
        const type = document.getElementById('currency_type').value;
        const amount = document.getElementById('amount_input').value;
        const resultUA = document.getElementById('result_display').innerText;
        const service = document.getElementById('service_select').value;
        const check = document.getElementById('check_link').value.trim();
        const wallet = document.getElementById('wallet_address').value.trim();
        
        const myTelegram = "Leslav"; 

        if (!check || !wallet || !amount) {
            alert("Будь ласка, заповніть всі поля!");
            return;
        }

        const message = `🚀 ЗАЯВКА LESLAV SWAP\n\n💰 Клієнт віддає: ${amount} ${type}\n📥 Має отримати: ${resultUA} UA\n🔹 Через: ${service}\n🔗 Чек: ${check}\n💎 Гаманець: ${wallet}`;
        const url = `https://t.me/${myTelegram}?text=${encodeURIComponent(message)}`;

        window.open(url, '_blank');
    }
</script>

</body>
</html>
