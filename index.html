<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESLAV SWAP | Premium Exchange</title>
    <style>
        :root {
            --bg: #18222d;
            --card: #212d3b;
            --accent: #0088cc;
            --text: #ffffff;
            --hint: #b1c3d5;
            --success: #4cd964;
            --overlay: rgba(0, 0, 0, 0.85);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .exchange-card {
            background: var(--card);
            padding: 25px;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 380px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .status { position: absolute; top: 20px; right: 20px; font-size: 10px; color: var(--success); font-weight: bold; display: flex; align-items: center; }
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; margin-right: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76, 217, 100, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(76, 217, 100, 0); } 100% { box-shadow: 0 0 0 0 rgba(76, 217, 100, 0); } }

        .ton-logo { width: 60px; height: 60px; margin: 0 auto 10px; background: var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .ton-logo svg { width: 35px; fill: white; }

        h2 { text-align: center; margin: 5px 0; font-size: 22px; letter-spacing: 1px; }
        .rate-badge { text-align: center; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 12px; font-size: 11px; margin-bottom: 15px; }

        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 10px; color: var(--hint); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #2f3e4e; background: #1c2733; color: white; outline: none; box-sizing: border-box; font-size: 14px; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .paste-btn { position: absolute; right: 10px; background: none; border: none; color: var(--accent); cursor: pointer; font-size: 16px; }

        .calc-res { background: rgba(0,136,204,0.1); padding: 15px; border-radius: 18px; text-align: center; border: 1px solid var(--accent); margin: 15px 0; }
        .calc-res span { color: var(--accent); font-size: 28px; font-weight: 800; display: block; }

        .main-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .row-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .secondary-btn { flex: 1; padding: 10px; background: transparent; color: var(--hint); border: 1px solid #2f3e4e; border-radius: 12px; font-size: 12px; cursor: pointer; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: var(--overlay); justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 24px; width: 85%; max-width: 320px; border: 1px solid var(--accent); }
        .modal-content h3 { margin-top: 0; font-size: 18px; text-align: center; }
        .close-modal { float: right; color: var(--hint); font-size: 20px; cursor: pointer; }

        .visitor-counter { margin-bottom: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 12px; font-size: 11px; color: var(--hint); display: flex; justify-content: center; align-items: center; gap: 8px; }
        .counter-num { color: var(--success); font-weight: bold; font-family: monospace; font-size: 14px; }

        .footer { font-size: 11px; color: var(--hint); text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
    </style>
</head>
<body>

<div class="exchange-card">
    <div class="status"><div class="dot"></div> Online</div>
    <div class="ton-logo">
        <svg viewBox="0 0 512 512"><path d="M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256s256-114.6 256-256S397.4 0 256 0zM380.1 169.5L271.7 394c-4.4 9.1-13.4 14.8-23.5 14.8s-19.1-5.7-23.5-14.8L116.3 169.5c-4.1-8.5-3.3-18.6 2.1-26.3c5.4-7.7 14.4-12.3 23.9-12.3h220.1c9.5 0 18.5 4.6 23.9 12.3c5.7 7.7 6.5 17.8 2.4 26.3z"></path></svg>
    </div>
    <h2>LESLAV SWAP</h2>
    <div class="rate-badge">1 TON = 100k UA | 5000 GRAM = 1 UA</div>

    <div class="input-group">
        <label>Валюта чека</label>
        <select id="type" onchange="calculate()">
            <option value="TON">TON Blockchain</option>
            <option value="GRAM">PR GRAM</option>
            <option value="USD">USD ($)</option>
        </select>
    </div>

    <div class="input-group">
        <label id="l_amt">Кількість TON</label>
        <input type="number" id="amt" step="any" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="calc-res">
        Ви отримаєте:<br><span id="res">0 UA</span>
    </div>

    <div class="input-group">
        <label>Сервіс чеку</label>
        <select id="service_select">
            <option value="Crypto Bot">Чек Crypto Bot</option>
            <option value="xRocket">Чек xRocket</option>
            <option value="EXTON">Чек EXTON</option>
            <option value="PR GRAM">Чек PR GRAM</option>
            <option value="iCryptoCheck">Чек iCryptoCheck</option>
        </select>
    </div>

    <div class="input-group">
        <label>Ваш гаманець TON (UQ...)</label>
        <div class="input-wrapper">
            <input type="text" id="wal" placeholder="Адреса отримувача">
            <button class="paste-btn" onclick="paste('wal')">📋</button>
        </div>
    </div>

    <div class="input-group">
        <label>Посилання на чек</label>
        <div class="input-wrapper">
            <input type="text" id="chk" placeholder="t.me/...">
            <button class="paste-btn" onclick="paste('chk')">📋</button>
        </div>
    </div>

    <button class="main-btn" onclick="swap()">ОФОРМИТИ ОБМІН</button>
    
    <div class="row-btns">
        <button class="secondary-btn" onclick="openModal()">⭐️ Відгук</button>
        <button class="secondary-btn" onclick="share()">🔗 Поділитися</button>
    </div>

    <div class="visitor-counter">
        👥 Переглядів сервісу: <span class="counter-num" id="visit-count">...</span>
    </div>

    <div class="footer">
        © 2026 <b>Leslav</b> & <b>Gemini AI</b>
    </div>
</div>

<div id="reviewModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3>Залишити відгук</h3>
        <div class="input-group">
            <label>Ваше ім'я / @Username</label>
            <input type="text" id="rev_name" placeholder="Як вас звати?">
        </div>
        <div class="input-group">
            <label>Повідомлення</label>
            <textarea id="rev_msg" rows="4" placeholder="Напишіть ваші враження..."></textarea>
        </div>
        <button class="main-btn" onclick="sendReview()">ВІДПРАВИТИ</button>
    </div>
</div>

<script>
    function calculate() {
        const type = document.getElementById('type').value;
        const val = document.getElementById('amt').value.replace(',', '.');
        const amount = parseFloat(val) || 0;
        const label = document.getElementById('l_amt');
        const result = document.getElementById('res');
        
        label.innerText = "Кількість " + (type === 'USD' ? 'USD' : type);
        
        let total = 0;
        if (type === 'TON') {
            total = amount * 100000;
        } else if (type === 'GRAM') {
            total = amount / 5000;
        } else if (type === 'USD') {
            total = amount * 20000;
        }

        // Відображення результату: для малих сум GRAM показуємо копійки, інакше заокруглюємо
        if (type === 'GRAM' && total > 0 && total < 1) {
            result.innerText = total.toFixed(2).replace('.', ',') + " UA";
        } else {
            result.innerText = Math.round(total).toLocaleString('uk-UA').replace(/,/g, ' ') + " UA";
        }
    }

    async function paste(id) {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById(id).value = text;
        } catch (e) { alert("Будь ласка, вставте вручну"); }
    }

    function share() {
        const botUrl = "http://t.me/Leslaswap_bot";
        const shareUrl = "https://t.me/share/url?url=" + encodeURIComponent(botUrl) + "&text=" + encodeURIComponent("🚀 Обмін TON/GRAM на UA в LESLAV SWAP!");
        window.open(shareUrl, '_blank');
    }

    function swap() {
        const a = document.getElementById('amt').value;
        const w = document.getElementById('wal').value;
        const c = document.getElementById('chk').value;
        const t = document.getElementById('type').value;
        const s = document.getElementById('service_select').value;
        if(!a || !w || !c) return alert("Заповніть усі поля!");
        const m = `🚀 ЗАЯВКА: ${a} ${t}\n📥 Отримаю: ${document.getElementById('res').innerText}\n🔹 Сервіс: ${s}\n💎 Гаманець: ${w}\n🔗 Чек: ${c}`;
        window.open(`https://t.me/Leslav?text=${encodeURIComponent(m)}`);
    }

    function openModal() { document.getElementById('reviewModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('reviewModal').style.display = 'none'; }
    function sendReview() {
        const name = document.getElementById('rev_name').value;
        const msg = document.getElementById('rev_msg').value;
        if(!name || !msg) return alert("Заповніть поля!");
        window.open(`https://t.me/Leslav?text=${encodeURIComponent("⭐️ ВІДГУК\nВід: "+name+"\n"+msg)}`);
        closeModal();
    }

    let count = localStorage.getItem('visit_count') || 216;
    count = parseInt(count) + 1;
    localStorage.setItem('visit_count', count);
    document.getElementById('visit-count').innerText = count;
</script>
</body>
</html>
