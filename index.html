<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESLAV SWAP | Калькулятор</title>
    <style>
        :root {
            --tg-theme-bg-color: #18222d;
            --tg-theme-button-color: #2ea6ff;
            --tg-theme-text-color: #ffffff;
            --tg-theme-hint-color: #b1c3d5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .exchange-card {
            background: #212d3b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        h2 { margin: 0 0 5px 0; color: var(--tg-theme-button-color); font-size: 26px; text-transform: uppercase; letter-spacing: 2px; }
        .rate-info { font-size: 12px; color: #4cd964; margin-bottom: 20px; font-weight: bold; }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 11px; margin-bottom: 6px; color: var(--tg-theme-hint-color); text-transform: uppercase; font-weight: bold; }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #2f3e4e;
            background: #1c2733;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }

        .calc-res {
            background: #1c2733;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border: 1px dashed var(--tg-theme-button-color);
        }

        .calc-res span { color: var(--tg-theme-button-color); font-size: 18px; font-weight: bold; }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--tg-theme-button-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .footer { margin-top: 20px; font-size: 11px; color: var(--tg-theme-hint-color); line-height: 1.4; }
    </style>
</head>
<body>

<div class="exchange-card">
    <h2>LESLAV SWAP</h2>
    <div class="rate-info">Курс: 1 TON = 100,000 UA</div>

    <div class="input-group">
        <label>Скільки TON ви віддаєте?</label>
        <input type="number" id="amount_input" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="calc-res">
        Ви отримаєте приблизно:<br>
        <span id="result_display">0</span> UA
    </div>

    <div class="input-group">
        <label>Тип чеку</label>
        <select id="service_select">
            <option value="PR GRAM">Чек PR GRAM</option>
            <option value="iCryptoCheck">Чек iCryptoCheck</option>
            <option value="Crypto Bot">Чек Crypto Bot</option>
            <option value="xRocket">Чек xRocket</option>
        </select>
    </div>

    <div class="input-group">
        <label>Посилання на чек</label>
        <input type="text" id="check_link" placeholder="Вставте посилання">
    </div>

    <div class="input-group">
        <label>Ваш гаманець TON</label>
        <input type="text" id="wallet_address" placeholder="UQ...">
    </div>

    <button onclick="startExchange()">Обміняти</button>

    <div class="footer">
        Розрахунок базується на курсі 0.00001 TON за 1 UA.
    </div>
</div>

<script>
    function calculate() {
        const amount = document.getElementById('amount_input').value;
        const resultDisplay = document.getElementById('result_display');
        
        if (amount > 0) {
            // 1 UA = 0.000010 TON => 1 TON = 100,000 UA
            const uaAmount = amount * 100000;
            resultDisplay.innerText = uaAmount.toLocaleString();
        } else {
            resultDisplay.innerText = "0";
        }
    }

    function startExchange() {
        const amount = document.getElementById('amount_input').value;
        const uaReceived = document.getElementById('result_display').innerText;
        const service = document.getElementById('service_select').value;
        const check = document.getElementById('check_link').value.trim();
        const wallet = document.getElementById('wallet_address').value.trim();
        const myTelegram = "Leslav"; 

        if (!check || !wallet || !amount) {
            alert("Будь ласка, заповніть всі поля!");
            return;
        }

        const message = `🚀 ЗАЯВКА LESLAV SWAP\n\n💰 Віддаю: ${amount} TON\n📥 Отримую: ${uaReceived} UA\n🔹 Сервіс: ${service}\n🔗 Чек: ${check}\n💎 Гаманець: ${wallet}`;
        const url = `https://t.me/${myTelegram}?text=${encodeURIComponent(message)}`;

        window.open(url, '_blank');
    }
</script>

</body>
</html>
