<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LESLAV EXCHANGE</title>
    <style>
        :root {
            --tg-theme-bg-color: #18222d;
            --tg-theme-button-color: #2ea6ff;
            --tg-theme-text-color: #ffffff;
            --tg-theme-hint-color: #b1c3d5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .exchange-card {
            background: #212d3b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        h2 { 
            margin-top: 0;
            margin-bottom: 5px; 
            color: var(--tg-theme-button-color);
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        p { color: var(--tg-theme-hint-color); font-size: 14px; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 11px; margin-bottom: 8px; color: var(--tg-theme-hint-color); text-transform: uppercase; font-weight: bold; }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #2f3e4e;
            background: #1c2733;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--tg-theme-button-color); }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--tg-theme-button-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(46, 166, 255, 0.3);
            text-transform: uppercase;
        }

        button:active { transform: scale(0.98); opacity: 0.9; }

        .footer { margin-top: 20px; font-size: 11px; color: var(--tg-theme-hint-color); line-height: 1.4; }
    </style>
</head>
<body>

<div class="exchange-card">
    <h2>LESLAV</h2>
    <p>Обмін крипто-чеків на токени UA</p>

    <div class="input-group">
        <label>Посилання на чек (Crypto/xRocket)</label>
        <input type="text" id="check_link" placeholder="https://t.me/CryptoBot?start=...">
    </div>

    <div class="input-group">
        <label>Ваша адреса гаманця TON</label>
        <input type="text" id="wallet_address" placeholder="UQ...">
    </div>

    <button onclick="startExchange()">Leslav Exchange</button>

    <div class="footer">
        Після натискання ви перейдете в чат Leslav<br>для завершення обміну
    </div>
</div>

<script>
    function startExchange() {
        const check = document.getElementById('check_link').value.trim();
        const wallet = document.getElementById('wallet_address').value.trim();
        
        // Твій юзернейм в Telegram
        const myTelegram = "Leslav"; 

        if (!check || !wallet) {
            alert("Будь ласка, заповніть усі поля!");
            return;
        }

        const message = `👋 Вітаю, Leslav!\nЯ через Leslav Exchange.\n\n🔗 Мій чек: ${check}\n💎 Мій гаманець TON: ${wallet}`;
        const url = `https://t.me/${myTelegram}?text=${encodeURIComponent(message)}`;

        window.open(url, '_blank');
    }
</script>

</body>
</html>
